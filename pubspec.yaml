name: flutter_application_1
description: "A new Flutter project."
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: ^3.11.0

dependencies:
  auto_size_text: ^3.0.0
  cached_network_image: ^3.4.1
  cloud_firestore: ^6.3.0
  crypto: ^3.0.7
  firebase_auth: ^6.4.0
  firebase_core: ^4.7.0
  firebase_storage: ^13.3.0
  flutter:
    sdk: flutter
  flutter_auto_size_text: ^5.0.0
  flutter_gen: ^5.14.1
  flutter_localizations:      
    sdk: flutter
  google_fonts: ^8.1.0
  google_sign_in: ^7.2.0
  image_picker: ^1.2.2
  intl: ^0.20.2 
  permission_handler: ^12.0.1
  provider: ^6.1.5+1
  shared_preferences: ^2.5.5
  supabase_flutter: ^2.12.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.4

flutter_launcher_icons:
  android: true
  ios: true 
  image_path: assets/images/logo/logo.png

flutter:
  uses-material-design: true
  generate: true 

  assets:
    - assets/images/profile/anonymus.jpg
    - assets/images/splash/splash_logo.png
    - assets/images/placeholder/placeholder.jpg
    - assets/images/logo/logo.png

  fonts:
    - family: Test
      fonts:
        - asset: assets/fonts/test.ttf
        